[databases]
; Add one line per database alias as new services are onboarded.
; A SIGHUP (docker kill --signal=HUP pgbouncer) activates changes without restarting.
;
; katisha-db must be listed here because auth_dbname = katisha-db below.
; pgbouncer resolves the host for auth_query lookups from this section.
katisha-db       = host=db port=5432 dbname=katisha-db
seaweed_metadata = host=db port=5432 dbname=seaweed_metadata
infisical        = host=db port=5432 dbname=infisical
notification_db  = host=db port=5432 dbname=notification_db

[pgbouncer]
listen_addr                = 0.0.0.0
listen_port                = 6432

; Auth — pgbouncer_auth queries get_auth() in katisha-db for every login.
; Only pgbouncer_auth itself is in userlist.txt; all other users are looked up at runtime.
; Plaintext password in userlist.txt is required so pgbouncer can perform SCRAM with postgres.
auth_type                  = scram-sha-256
auth_file                  = /etc/pgbouncer/userlist.txt
auth_user                  = pgbouncer_auth
auth_query                 = SELECT * FROM public.get_auth($1)
auth_dbname                = katisha-db

; Pool — transaction mode required for Prisma and stateless microservices
pool_mode                  = transaction
max_client_conn            = 1000
default_pool_size          = 20
reserve_pool_size          = 5
reserve_pool_timeout       = 5
; Hard cap on backend connections per database (default_pool_size + reserve_pool_size)
max_db_connections         = 25

; Fail-fast — surface backend issues quickly rather than letting clients queue
query_wait_timeout         = 5
server_connect_timeout     = 5
client_login_timeout       = 5

; Logging
log_connections            = 1
log_disconnections         = 1

; Admin console — connect to the virtual "pgbouncer" database as pgbouncer_auth
admin_users                = pgbouncer_auth
stats_users                = pgbouncer_auth

; Compatibility — Prisma sends extra_float_digits at startup; ignore to avoid errors
ignore_startup_parameters  = extra_float_digits

; TLS — disabled; all traffic is internal on katisha-net
server_tls_sslmode         = disable
